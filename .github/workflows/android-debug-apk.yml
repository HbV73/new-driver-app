# Builds a debug APK on GitHub Actions (no Android Studio needed locally).
# Demo Supabase credentials are inlined for CI (replace when moving past demo).

name: Android debug APK

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm ci

      - name: Build web (Vite)
        env:
          VITE_SUPABASE_URL: https://igvureriqikqtefxqkje.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlndnVyZXJpcWlrcXRlZnhxa2plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzU3OTMsImV4cCI6MjA5MDAxMTc5M30.XTI5dPBIfUZmT_8hMplJ8zZ9uurvMJI2toj4Y-gm8j4
          VITE_DRIVER_API_PROVIDER: rest
          VITE_DRIVER_API_BASE_URL: https://apis.germanwm.de
        run: npm run build

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
